services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    profiles: ["ollama"]
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama

  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_NAME: ${APP_NAME:-Praina API}
      ENVIRONMENT: ${ENVIRONMENT:-prod}
      API_V1_PREFIX: ${API_V1_PREFIX:-/api/v1}
      ROOT_PATH: ${ROOT_PATH:-}
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_INTERNAL_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      DOCUMENTS_STORAGE_PATH: /app/storage/documents
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-30}
      TEXT_INFERENCE_PROVIDER: ${TEXT_INFERENCE_PROVIDER:-ollama}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3.5:9b}
      OLLAMA_ENABLE_THINKING: ${OLLAMA_ENABLE_THINKING:-false}
      OLLAMA_EMBEDDING_MODEL: ${OLLAMA_EMBEDDING_MODEL:-nomic-embed-text-v2-moe}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-768}
      EMBEDDING_BATCH_SIZE: ${EMBEDDING_BATCH_SIZE:-16}
      EMBEDDING_HTTP_TIMEOUT_SECONDS: ${EMBEDDING_HTTP_TIMEOUT_SECONDS:-300}
      ASSISTANT_TEMPERATURE: ${ASSISTANT_TEMPERATURE:-0.2}
      ASSISTANT_HTTP_TIMEOUT_SECONDS: ${ASSISTANT_HTTP_TIMEOUT_SECONDS:-60}
      ACTION_EXTRACTION_HTTP_TIMEOUT_SECONDS: ${ACTION_EXTRACTION_HTTP_TIMEOUT_SECONDS:-180}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      CODEX_MODEL: ${CODEX_MODEL:-gpt-5.4}
      CODEX_TIMEOUT_SECONDS: ${CODEX_TIMEOUT_SECONDS:-120}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - backend_storage:/app/storage
    expose:
      - "8000"

  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: ${BASE_PATH:-}/api/v1
        VITE_PUBLIC_BASE: ${BASE_PATH:-}/
        VITE_DEV_PORT: 5173
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      BASE_PATH: ${BASE_PATH:-}
    ports:
      - "${FRONTEND_PORT:-8080}:80"

volumes:
  postgres_data:
  backend_storage:
  ollama_data:
